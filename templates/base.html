<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber | Painel Administrativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { min-height: 100vh; background: #212529; color: white; padding-top: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .nav-link { color: #adb5bd; margin-bottom: 5px; transition: 0.3s; border-radius: 5px; padding: 10px 15px; }
        .nav-link:hover { color: white; background: #343a40; }
        .nav-link.active { color: white; background: #0d6efd; }
        .main-content { padding: 30px; }
        .sidebar-heading { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .1rem; color: #6c757d; padding: 15px 15px 5px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse shadow-sm">
                <div class="position-sticky">
                    <div class="text-center mb-4 px-3">
                        <h4 class="text-white">💈 Barber</h4>
                        <hr class="text-secondary">
                    </div>
                    
                    <div class="nav flex-column px-2">
                        <a href="{% url 'dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                            🏠 Início / Agenda
                        </a>

                        {% if user.is_staff %}
                            <div class="sidebar-heading">Gestão de Negócio</div>
                            
                            <a href="{% url 'estoque' %}" class="nav-link {% if request.resolver_match.url_name == 'estoque' %}active{% endif %}">
                                📦 Estoque
                            </a>
                            
                            <a href="{% url 'equipe' %}" class="nav-link {% if request.resolver_match.url_name == 'equipe' %}active{% endif %}">
                                👥 Equipe / Usuários
                            </a>

                            <a href="{% url 'novo_agendamento' %}" class="nav-link">
                                ➕ Novo Corte
                            </a>
                        {% endif %}
                        
                        <a href="/admin/" class="nav-link">
                            ⚙️ Painel Django
                        </a>

                        <div class="mt-5">
                            <hr class="text-secondary">
                            <a href="/admin/logout/" class="nav-link text-danger">
                                🚪 Sair do Sistema
                            </a>
                        </div>
                    </div>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 main-content">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
