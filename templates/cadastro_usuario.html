{% extends 'base.html' %}

{% block title %}Novo Usuário - Barber Shop{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-4">
    <h1 class="page-header">
        <i class="bi bi-person-plus me-2 text-gold"></i>Novo Usuário
    </h1>
    <a href="{% url 'equipe' %}" class="btn btn-outline-gold">
        <i class="bi bi-arrow-left me-1"></i> Voltar
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-person-plus me-2"></i>Cadastrar Novo Usuário
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-person me-1"></i>Nome de Usuário</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-lock me-1"></i>Senha</label>
                        <input type="password" name="password1" class="form-control" required>
                        <small class="text-muted">Mínimo 8 caracteres</small>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold"><i class="bi bi-lock-fill me-1"></i>Confirmar Senha</label>
                        <input type="password" name="password2" class="form-control" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-gold btn-lg">
                            <i class="bi bi-check-lg me-1"></i> Criar Usuário
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
