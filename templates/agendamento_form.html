{% extends 'base.html' %}

{% block title %}Novo Agendamento - Barber Shop{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-4">
    <h1 class="page-header"><i class="bi bi-plus-circle me-2 text-gold"></i>Novo Agendamento</h1>
    <a href="{% url 'dashboard' %}" class="btn btn-outline-gold">
        <i class="bi bi-arrow-left me-1"></i> Voltar
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-calendar-plus me-2"></i>Agendar Novo Serviço
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-person me-1"></i>Cliente</label>
                        <select name="cliente" class="form-select" required>
                            <option value="">Selecione um cliente...</option>
                            {% for cliente in clientes %}
                                <option value="{{ cliente.id }}">{{ cliente.username }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold"><i class="bi bi-scissors me-1"></i>Serviço</label>
                            <select name="servico" class="form-select" required>
                                <option value="">Selecione um serviço...</option>
                                {% for servico in servicos %}
                                    <option value="{{ servico.id }}">{{ servico.nome }} - R$ {{ servico.preco }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold"><i class="bi bi-person-badge me-1"></i>Barbeiro</label>
                            <select name="barbeiro" class="form-select" required>
                                <option value="">Selecione um barbeiro...</option>
                                {% for barbeiro in barbeiros %}
                                    <option value="{{ barbeiro.id }}">{{ barbeiro.username }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold"><i class="bi bi-clock me-1"></i>Data e Horário</label>
                        <input type="datetime-local" name="data_hora" class="form-control" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-gold btn-lg">
                            <i class="bi bi-check-lg me-1"></i> Confirmar Agendamento
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
